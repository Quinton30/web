<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modify Data | DataMatrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                600: '#2563eb',
                700: '#1d4ed8',
              },
              dark: {
                800: '#1e293b',
                900: '#0f172a',
              },
              accent: {
                400: '#38bdf8',
                500: '#0ea5e9',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-dark-900 text-gray-100 font-sans min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-dark-800 border-b border-gray-700 shadow-xl">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Brand -->
          <div class="flex-shrink-0 flex items-center">
            <svg
              class="h-8 w-8 text-accent-500 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"
              />
            </svg>
            <span
              class="text-xl font-bold bg-gradient-to-r from-accent-400 to-primary-600 bg-clip-text text-transparent"
              >DataMatrix</span
            >
          </div>

          <!-- Mobile menu button -->
          <div class="sm:hidden">
            <button
              id="menu-button"
              class="text-gray-300 hover:text-white focus:outline-none"
            >
              <svg
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                />
              </svg>
            </button>
          </div>

          <!-- Desktop Menu -->
          <div class="hidden sm:flex space-x-4">
            <a
              href="index.html"
              class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
              >Home</a
            >
            <a
              href="viewdata.html"
              class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
              >View Data</a
            >
            <a
              href="addnewdata.html"
              class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
              >Add Data</a
            >
            <a
              href="modifyingdata.html"
              class="px-3 py-2 rounded-md text-sm font-medium bg-gray-700 text-white"
              >Modify Data</a
            >
          </div>
        </div>
      </div>

      <!-- Mobile Menu Items -->
      <div id="mobile-menu" class="sm:hidden hidden px-2 pt-2 pb-3 space-y-1">
        <a
          href="index.html"
          class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
          >Home</a
        >
        <a
          href="viewdata.html"
          class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
          >View Data</a
        >
        <a
          href="addnewdata.html"
          class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
          >Add Data</a
        >
        <a
          href="modifyingdata.html"
          class="block px-3 py-2 rounded-md text-base font-medium bg-gray-700 text-white"
          >Modify Data</a
        >
      </div>
    </nav>

    <script>
      const button = document.getElementById('menu-button')
      const menu = document.getElementById('mobile-menu')

      button.addEventListener('click', () => {
        menu.classList.toggle('hidden')
      })
    </script>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4 sm:p-6">
      <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
          <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2">
            Modify Data
          </h1>
          <p class="text-gray-400 max-w-lg mx-auto">
            Select a record and update its information
          </p>
        </div>

        <!-- User Selection Card -->
        <div
          class="bg-dark-800 border border-gray-700 rounded-xl shadow-lg overflow-hidden mb-6"
        >
          <div
            class="bg-gradient-to-r from-dark-800 to-dark-700 px-6 py-4 border-b border-gray-700"
          >
            <h2 class="text-lg font-semibold text-white flex items-center">
              <svg
                class="w-5 h-5 mr-2 text-accent-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
              Select User
            </h2>
          </div>
          <div class="p-6">
            <div class="space-y-4">
              <div>
                <label
                  for="userSelect"
                  class="block text-sm font-medium text-gray-300 mb-2"
                  >Choose a record to modify</label
                >
                <select
                  id="userSelect"
                  class="bg-dark-700 border border-gray-600 text-black placeholder-gray-400 focus:ring-2 focus:ring-accent-500 focus:border-accent-500 block w-full px-4 py-3 rounded-lg focus:outline-none transition"
                >
                  <option value="">-- Select a User --</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Form Container -->
        <div
          class="bg-dark-800 border border-gray-700 rounded-xl shadow-lg overflow-hidden"
          id="formContainer"
          style="display: none"
        >
          <div
            class="bg-gradient-to-r from-dark-800 to-dark-700 px-6 py-4 border-b border-gray-700"
          >
            <h2
              class="text-lg font-semibold text-white flex items-center justify-between"
            >
              <span>
                <svg
                  class="w-5 h-5 mr-2 text-accent-400 inline"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                  />
                </svg>
                Edit Record
              </span>
              <span
                id="recordIdBadge"
                class="bg-gray-700 text-xs font-medium px-3 py-1 rounded-full"
              >
                ID: <span id="currentRecordId"></span>
              </span>
            </h2>
          </div>

          <!-- Form -->
          <form id="modifyForm" class="p-6">
            <input type="hidden" id="id" />
            <div class="space-y-6">
              <!-- Name Field -->
              <div>
                <label
                  for="name"
                  class="block text-sm font-medium text-gray-300 mb-1"
                >
                  Full Name *
                </label>
                <div class="mt-1 relative rounded-md shadow-sm">
                  <input
                    type="text"
                    id="name"
                    name="name"
                    required
                    class="bg-dark-700 border border-gray-600 text-black placeholder-gray-400 focus:ring-2 focus:ring-accent-500 focus:border-accent-500 block w-full px-4 py-3 rounded-lg focus:outline-none transition"
                  />
                </div>
              </div>

              <!-- Email Field -->
              <div>
                <label
                  for="email"
                  class="block text-sm font-medium text-gray-300 mb-1"
                >
                  Email Address *
                </label>
                <div class="mt-1 relative rounded-md shadow-sm">
                  <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    class="bg-dark-700 border border-gray-600 text-black placeholder-gray-400 focus:ring-2 focus:ring-accent-500 focus:border-accent-500 block w-full px-4 py-3 rounded-lg focus:outline-none transition"
                  />
                </div>
              </div>

              <!-- Submit Button -->
              <div class="pt-2">
                <button
                  type="submit"
                  class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gradient-to-r from-primary-600 to-accent-500 hover:from-primary-700 hover:to-accent-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-500 transition-all"
                >
                  <svg
                    class="w-5 h-5 mr-2"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M5 13l4 4L19 7"
                    />
                  </svg>
                  Update Record
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- Message Display -->
        <p id="message" class="mt-4 text-center text-red-500 font-medium"></p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark-800 border-t border-gray-700 py-6">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-center">
          <div class="flex items-center">
            <svg
              class="h-6 w-6 text-accent-500 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"
              />
            </svg>
            <span
              class="text-lg font-semibold bg-gradient-to-r from-accent-400 to-primary-600 bg-clip-text text-transparent"
              >DataMatrix</span
            >
          </div>
          <div class="mt-4 md:mt-0 text-center md:text-right">
            <p class="text-xs text-gray-400">
              &copy; 2025 DataMatrix. All rights reserved.
            </p>
            <p class="text-xs text-gray-500 mt-1">v1.0.0</p>
          </div>
        </div>
      </div>
    </footer>

    <script>
      // Fetch and populate the dropdown
      async function loadDropdown() {
        try {
          const response = await fetch(
            'https://web-kyrd.onrender.com/get-distinct-users'
          )
          const users = await response.json()
          const userSelect = document.getElementById('userSelect')

          users.forEach((user) => {
            const option = document.createElement('option')
            option.value = user.id // Use ID as the value
            option.textContent = user.name // Display name
            userSelect.appendChild(option)
          })
        } catch (error) {
          console.error('Error loading dropdown:', error)
        }
      }

      // Fetch user details when selected
      document
        .getElementById('userSelect')
        .addEventListener('change', async function () {
          const selectedId = this.value
          if (!selectedId) {
            document.getElementById('formContainer').style.display = 'none'
            return
          }

          try {
            const response = await fetch(
              `https://web-kyrd.onrender.com/get-user-details?id=${encodeURIComponent(
                selectedId
              )}`
            )
            const userData = await response.json()

            if (userData.error) {
              document.getElementById('message').innerText = userData.error
              document.getElementById('message').classList.add('text-red-500')
              document.getElementById('formContainer').style.display = 'none'
              return
            }

            document.getElementById('id').value = userData.id
            document.getElementById('name').value = userData.name
            document.getElementById('email').value = userData.email
            document.getElementById('currentRecordId').textContent = userData.id
            document.getElementById('formContainer').style.display = 'block'
            document.getElementById('message').innerText = ''
          } catch (error) {
            console.error('Error fetching user details:', error)
            document.getElementById('message').innerText =
              'Error loading user details'
            document.getElementById('message').classList.add('text-red-500')
          }
        })

      // Handle form submission for update
      document
        .getElementById('modifyForm')
        .addEventListener('submit', async function (event) {
          event.preventDefault()

          const id = document.getElementById('id').value
          const name = document.getElementById('name').value
          const email = document.getElementById('email').value

          if (!id) {
            document.getElementById('message').innerText =
              'Please select a user first.'
            document.getElementById('message').classList.add('text-red-500')
            return
          }

          try {
            const response = await fetch(
              'https://web-kyrd.onrender.com/modify-data',
              {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, name, email }),
              }
            )

            const result = await response.json()

            if (response.ok) {
              document.getElementById('message').innerText =
                'Data updated successfully!'
              document
                .getElementById('message')
                .classList.remove('text-red-500')
              document.getElementById('message').classList.add('text-green-500')
            } else {
              throw new Error(result.error || 'Failed to update data')
            }
          } catch (error) {
            console.error('Error:', error)
            document.getElementById('message').innerText =
              error.message || 'Error updating data'
            document
              .getElementById('message')
              .classList.remove('text-green-500')
            document.getElementById('message').classList.add('text-red-500')
          }
        })

      // Load dropdown options on page load
      window.onload = loadDropdown
    </script>
  </body>
</html>
