<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="font-sans bg-gradient-to-r from-purple-700 via-indigo-600 to-blue-500 text-gray-800 min-h-screen flex flex-col"
  >
    <nav
      class="bg-gray-800 text-white p-4 flex flex-col sm:flex-row sm:justify-between sm:items-center shadow-lg"
    >
      <div class="text-xl font-semibold text-center sm:text-left">
        Data Management
      </div>
      <div
        class="flex flex-col sm:flex-row sm:space-x-4 mt-4 sm:mt-0 text-center"
      >
        <a href="index.html" class="hover:text-gray-300 transition">Home</a>
        <a href="viewdata.html" class="hover:text-gray-300 transition"
          >View Data</a
        >
        <a href="addnewdata.html" class="hover:text-gray-300 transition"
          >Add New Data</a
        >
        <a href="modifyingdata.html" class="hover:text-gray-300 transition"
          >Modify Data</a
        >
      </div>
    </nav>

    <div
      class="container max-w-lg mx-auto mt-8 sm:mt-16 bg-white p-6 sm:p-10 rounded-2xl shadow-2xl transform hover:scale-105 transition duration-300"
    >
      <h2
        class="text-center text-2xl sm:text-3xl font-extrabold text-purple-700 mb-6 sm:mb-8"
      >
        Add New User
      </h2>
      <form id="dataForm" class="space-y-4 sm:space-y-6">
        <div>
          <label for="name" class="block mb-2 font-semibold text-gray-700"
            >Name:</label
          >
          <input
            type="text"
            id="name"
            name="name"
            required
            class="w-full px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-4 focus:ring-purple-500 transition"
          />
        </div>

        <div>
          <label for="email" class="block mb-2 font-semibold text-gray-700"
            >Email:</label
          >
          <input
            type="email"
            id="email"
            name="email"
            required
            class="w-full px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-4 focus:ring-purple-500 transition"
          />
        </div>

        <div>
          <label for="age" class="block mb-2 font-semibold text-gray-700"
            >Age:</label
          >
          <input
            type="number"
            id="age"
            name="age"
            required
            class="w-full px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-4 focus:ring-purple-500 transition"
          />
        </div>
        <div>
          <label for="age" class="block mb-2 font-semibold text-gray-700"
            >DOB:</label
          >
          <input
            type="date"
            pattern="\d{4}-\d{2}-\d{2}"
            placeholder="YYYY-MM-DD"
            id="dob"
            name="dob"
            required
            class="w-full px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-4 focus:ring-purple-500 transition"
          />
        </div>

        <button
          type="submit"
          class="w-full py-2 sm:py-3 bg-gradient-to-r from-purple-600 to-blue-500 text-white font-bold rounded-lg hover:shadow-xl transform hover:-translate-y-1 transition duration-300"
        >
          Submit
        </button>
      </form>
      <p
        id="message"
        class="mt-4 sm:mt-6 text-center text-red-600 font-semibold text-sm sm:text-lg"
      ></p>
    </div>

    <footer
      class="text-center mt-auto py-4 text-white text-xs sm:text-sm bg-gray-900"
    >
      &copy; 2023 Data Management System. All rights reserved.
      <br />
    </footer>

    <script>
      document
        .getElementById('dataForm')
        .addEventListener('submit', async function (event) {
          event.preventDefault()

          const formData = new FormData(this)
          const jsonData = Object.fromEntries(formData.entries())

          try {
            const response = await fetch('/submit', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(jsonData),
            })

            const result = await response.text()
            document.getElementById('message').innerText = result

            if (response.ok) {
              this.reset()
              document
                .getElementById('message')
                .classList.remove('text-red-600')
              document.getElementById('message').classList.add('text-green-600')
            }
          } catch (error) {
            document.getElementById('message').innerText =
              'Error submitting data.'
          }
        })
    </script>
  </body>
</html>
