<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Data | DataMatrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                600: '#2563eb',
                700: '#1d4ed8',
              },
              dark: {
                800: '#1e293b',
                900: '#0f172a',
              },
              accent: {
                400: '#38bdf8',
                500: '#0ea5e9',
              },
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-dark-900 text-gray-100 font-sans min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-dark-800 border-b border-gray-700 shadow-xl">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Brand -->
          <div class="flex-shrink-0 flex items-center">
            <svg
              class="h-8 w-8 text-accent-500 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"
              />
            </svg>
            <span
              class="text-xl font-bold bg-gradient-to-r from-accent-400 to-primary-600 bg-clip-text text-transparent"
              >DataMatrix</span
            >
          </div>

          <!-- Mobile menu button -->
          <div class="sm:hidden">
            <button
              id="menu-button"
              class="text-gray-300 hover:text-white focus:outline-none"
            >
              <svg
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                />
              </svg>
            </button>
          </div>

          <!-- Desktop Menu -->
          <div class="hidden sm:flex space-x-4">
            <a
              href="index.html"
              class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
              >Home</a
            >
            <a
              href="viewdata.html"
              class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
              >View Data</a
            >
            <a
              href="addnewdata.html"
              class="px-3 py-2 rounded-md text-sm font-medium bg-gray-700 text-white"
              >Add Data</a
            >
            <a
              href="modifyingdata.html"
              class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
              >Modify Data</a
            >
          </div>
        </div>
      </div>

      <!-- Mobile Menu Items -->
      <div id="mobile-menu" class="sm:hidden hidden px-2 pt-2 pb-3 space-y-1">
        <a
          href="index.html"
          class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
          >Home</a
        >
        <a
          href="viewdata.html"
          class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
          >View Data</a
        >
        <a
          href="addnewdata.html"
          class="block px-3 py-2 rounded-md text-base font-medium bg-gray-700 text-white"
          >Add Data</a
        >
        <a
          href="modifyingdata.html"
          class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700 transition"
          >Modify Data</a
        >
      </div>
    </nav>

    <script>
      const button = document.getElementById('menu-button')
      const menu = document.getElementById('mobile-menu')

      button.addEventListener('click', () => {
        menu.classList.toggle('hidden')
      })
    </script>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4 sm:p-6">
      <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
          <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2">
            Add New Data
          </h1>
          <p class="text-gray-400 max-w-lg mx-auto">
            Fill out the form below to add new records to the database
          </p>
        </div>

        <!-- Form Container -->
        <div
          class="bg-dark-800 border border-gray-700 rounded-xl shadow-2xl overflow-hidden"
        >
          <!-- Form Header -->
          <div
            class="bg-gradient-to-r from-dark-800 to-dark-700 px-6 py-4 border-b border-gray-700"
          >
            <h2 class="text-xl font-semibold text-white flex items-center">
              <svg
                class="w-5 h-5 mr-2 text-accent-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 6v6m0 0v6m0-6h6m-6 0H6"
                />
              </svg>
              New Data Entry
            </h2>
          </div>

          <!-- Form -->
          <form id="dataForm" class="p-6 sm:p-8">
            <div class="space-y-6">
              <!-- Name Field -->
              <div>
                <label
                  for="name"
                  class="block text-sm font-medium text-gray-300 mb-1"
                >
                  Name *
                </label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  required
                  class="bg-dark-700 border border-gray-600 text-black placeholder-gray-400 focus:ring-2 focus:ring-accent-500 focus:border-accent-500 block w-full px-4 py-3 rounded-lg focus:outline-none transition"
                />
              </div>

              <!-- Email Field -->
              <div>
                <label
                  for="email"
                  class="block text-sm font-medium text-gray-300 mb-1"
                >
                  Email *
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  required
                  class="bg-dark-700 border border-gray-600 text-black placeholder-gray-400 focus:ring-2 focus:ring-accent-500 focus:border-accent-500 block w-full px-4 py-3 rounded-lg focus:outline-none transition"
                />
              </div>

              <!-- Age Field -->
              <div>
                <label
                  for="age"
                  class="block text-sm font-medium text-gray-300 mb-1"
                >
                  Age *
                </label>
                <input
                  type="number"
                  id="age"
                  name="age"
                  required
                  class="bg-dark-700 border border-gray-600 text-black placeholder-gray-400 focus:ring-2 focus:ring-accent-500 focus:border-accent-500 block w-full px-4 py-3 rounded-lg focus:outline-none transition"
                />
              </div>

              <!-- DOB Field -->
              <div>
                <label
                  for="dob"
                  class="block text-sm font-medium text-gray-300 mb-1"
                >
                  DOB *
                </label>
                <input
                  type="date"
                  pattern="\d{4}-\d{2}-\d{2}"
                  placeholder="YYYY-MM-DD"
                  id="dob"
                  name="dob"
                  required
                  class="bg-dark-700 border border-gray-600 text-black placeholder-gray-400 focus:ring-2 focus:ring-accent-500 focus:border-accent-500 block w-full px-4 py-3 rounded-lg focus:outline-none transition"
                />
              </div>

              <!-- Submit Button -->
              <button
                type="submit"
                class="w-full py-3 bg-gradient-to-r from-primary-600 to-accent-500 text-white font-medium rounded-lg shadow hover:from-primary-700 hover:to-accent-600 transition-all"
              >
                Submit
              </button>
            </div>
          </form>
        </div>

        <!-- Message Display -->
        <p id="message" class="mt-4 text-center text-red-500 font-medium"></p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark-800 border-t border-gray-700 py-6">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-center">
          <div class="flex items-center">
            <svg
              class="h-6 w-6 text-accent-500 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"
              />
            </svg>
            <span
              class="text-lg font-semibold bg-gradient-to-r from-accent-400 to-primary-600 bg-clip-text text-transparent"
              >DataMatrix</span
            >
          </div>
          <div class="mt-4 md:mt-0 text-center md:text-right">
            <p class="text-xs text-gray-400">
              &copy; 2025 DataMatrix. All rights reserved.
            </p>
            <p class="text-xs text-gray-500 mt-1">v1.0.0</p>
          </div>
        </div>
      </div>
    </footer>

    <!-- Previous HTML remains the same until the script section -->
    <script>
      document
        .getElementById('dataForm')
        .addEventListener('submit', async function (event) {
          event.preventDefault()

          // Show loading state
          const submitBtn = event.target.querySelector('button[type="submit"]')
          submitBtn.disabled = true
          submitBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Processing...
      `

          const formData = new FormData(this)
          const jsonData = Object.fromEntries(formData.entries())

          try {
            const response = await fetch('/submit', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Accept: 'application/json',
              },
              body: JSON.stringify(jsonData),
            })

            const result = await response.json()

            if (!response.ok) {
              throw new Error(result.message || 'Failed to submit data')
            }

            document.getElementById('message').innerText =
              'Data inserted successfully!'
            document.getElementById('message').classList.remove('text-red-500')
            document.getElementById('message').classList.add('text-green-500')
            this.reset()
          } catch (error) {
            console.error('Error:', error)
            document.getElementById('message').innerText =
              error.message || 'Database error occurred'
            document
              .getElementById('message')
              .classList.remove('text-green-500')
            document.getElementById('message').classList.add('text-red-500')
          } finally {
            submitBtn.disabled = false
            submitBtn.innerHTML = 'Submit'
          }
        })
    </script>
  </body>
</html>
