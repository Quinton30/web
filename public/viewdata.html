<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800">
    <nav
      class="bg-gray-800 text-white p-4 flex flex-col sm:flex-row justify-between items-center shadow-lg"
    >
      <div class="text-xl font-semibold mb-2 sm:mb-0">Data Management</div>
      <div class="flex flex-wrap justify-center sm:justify-end space-x-4">
        <a href="index.html" class="hover:text-gray-300 transition">Home</a>
        <a href="viewdata.html" class="hover:text-gray-300 transition"
          >View Data</a
        >
        <a href="addnewdata.html" class="hover:text-gray-300 transition"
          >Add New Data</a
        >
        <a href="modifyingdata.html" class="hover:text-gray-300 transition"
          >Modify Data</a
        >
      </div>
    </nav>

    <div class="container mx-auto p-4 sm:p-6">
      <h1 class="text-2xl font-bold text-center mb-6">User Data</h1>
      <p id="loading" class="text-gray-600 text-center mb-4">Loading data...</p>
      <div class="overflow-x-auto shadow-lg rounded-lg">
        <table class="table-auto w-full border-collapse bg-white rounded-lg">
          <thead>
            <tr class="bg-gray-800 text-white">
              <th class="border border-gray-300 px-4 sm:px-6 py-3 text-left">
                ID
              </th>
              <th class="border border-gray-300 px-4 sm:px-6 py-3 text-left">
                Name
              </th>
              <th class="border border-gray-300 px-4 sm:px-6 py-3 text-left">
                Email
              </th>
              <th class="border border-gray-300 px-4 sm:px-6 py-3 text-left">
                Age
              </th>
              <th class="border border-gray-300 px-4 sm:px-6 py-3 text-left">
                DOB
              </th>
            </tr>
          </thead>
          <tbody id="dataTable" class="divide-y divide-gray-200"></tbody>
        </table>
      </div>
    </div>

    <script>
      async function fetchData() {
        try {
          const response = await fetch('/view-data')
          const data = await response.json()

          const tableBody = document.getElementById('dataTable')
          const loadingText = document.getElementById('loading')

          tableBody.innerHTML = '' // Clear existing rows
          loadingText.style.display = 'none' // Hide loading message

          if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-gray-500">No data available</td></tr>`
            return
          }

          data.forEach((user) => {
            tableBody.innerHTML += `
              <tr class="hover:bg-gray-100">
                <td class="border border-gray-300 px-4 sm:px-6 py-3">${user.id}</td>
                <td class="border border-gray-300 px-4 sm:px-6 py-3">${user.name}</td>
                <td class="border border-gray-300 px-4 sm:px-6 py-3">${user.email}</td>
                <td class="border border-gray-300 px-4 sm:px-6 py-3">${user.age}</td>
                <td class="border border-gray-300 px-4 sm:px-6 py-3">${user.dob}</td>
              </tr>
            `
          })
        } catch (error) {
          console.error('Error fetching data:', error)
          document.getElementById('loading').innerText = 'Error loading data.'
        }
      }

      window.onload = fetchData
    </script>
  </body>
  <footer
    class="text-center mt-auto py-4 text-white text-xs sm:text-sm bg-gray-900"
  >
    &copy; 2023 Data Management System. All rights reserved.
    <br />
  </footer>
</html>
